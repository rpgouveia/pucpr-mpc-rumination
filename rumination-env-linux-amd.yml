name: rumination
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pandas
  - numpy
  - scikit-learn
  - matplotlib
  - seaborn
  - tqdm
  - jupyterlab
  - ipykernel
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/rocm7.2
      - torch==2.11.0+rocm7.2
      - torchvision==0.26.0+rocm7.2
      - torchaudio==2.11.0+rocm7.2
      - torchinfo